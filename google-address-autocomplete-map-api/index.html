<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Address Autocomplete</title>
</head>
<body>
    
    <div class="col-sm-8">
         <label for="searchTextField">Search Location</label>
        <input id="searchTextField" type="text" class="form-control" size="50" placeholder="Enter a location" autocomplete="on" runat="server" name="complete_location_address" />
        <input type="hidden" id="location-name" name="location_name" />
        <input type="hidden" id="location-latitude" name="location_latitude" />
        <input type="hidden" id="location-longitude" name="location_longitude" />
    </div>


<!-- <script type="text/javascript" src="https://maps.googleapis.com/maps/api/js?key={{ $googleMapApiKey['data']->api_key }}&libraries=places"></script> -->
<script type="text/javascript" src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAGqSnHxlQETdvGeBjg94OaIvHOFwW0_9k&libraries=places"></script>
<script>
    function initialize() {
        var input = document.getElementById('searchTextField');
        var autocomplete = new google.maps.places.Autocomplete(input);
        google.maps.event.addListener(autocomplete, 'place_changed', function () {
            var place = autocomplete.getPlace();
            document.getElementById('location-name').value = place.name;
            document.getElementById('location-latitude').value = place.geometry.location.lat();
            document.getElementById('location-longitude').value = place.geometry.location.lng();
        });
    }
    google.maps.event.addDomListener(window, 'load', initialize);
</script>
</body>
</html>
