<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="bs5.min.css">
    <link rel="stylesheet" href="style.min.css">
</head>
<body>
    <h1>Multi select tag</h1>
    <select name="select2" id="emp-id" multiple>
        <option value="1">123</option>
        <option value="21">12s3</option>
        <option value="13">1s23</option>
    </select>
    <script src="jquery.min.js"></script>
    <script src="bs5.min.js"></script>
    <script src="script.min.js"></script>
    <script>
        $(document).ready(function(){
            $('select').select2();
        });
    </script>
</body>
</html>
